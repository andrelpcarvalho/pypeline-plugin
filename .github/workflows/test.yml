name: Tests

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
      - 'release/**'
      - 'feature/**'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pypeline

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: yarn install --ignore-engines

      - name: Lint
        run: yarn lint

      - name: Compile TypeScript
        run: npx tsc -p tsconfig.json

      - name: Unit tests
        run: yarn test:only

      - name: Generate oclif manifest (validate commands)
        run: npx oclif manifest
